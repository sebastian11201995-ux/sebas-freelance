<svg width="800" height="560" viewBox="0 0 800 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="800" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141210"/>
      <stop offset="1" stop-color="#1a1714"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0c979"/>
      <stop offset="1" stop-color="#d8aa5d"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="1" x2="0" y2="0">
      <stop stop-color="#d8aa5d" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#f0c979"/>
    </linearGradient>
    <linearGradient id="ivoryBar" x1="0" y1="1" x2="0" y2="0">
      <stop stop-color="#f6efe1" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#f6efe1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="46" y1="330" x2="370" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d8aa5d" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#f0c979"/>
      <stop offset="1" stop-color="#d8aa5d" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="200" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d8aa5d" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#d8aa5d" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="12"/></filter>
    <clipPath id="roundedMain"><rect x="0" y="0" width="800" height="560" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#roundedMain)">
    <!-- Background -->
    <rect width="800" height="560" fill="url(#cardBg)"/>
    <rect width="800" height="560" fill="#f6efe1" fill-opacity="0.02"/>

    <!-- Top bar -->
    <rect width="800" height="48" fill="#0f0e0c"/>
    <rect x="0" y="47" width="800" height="1" fill="#f6efe1" fill-opacity="0.08"/>
    <circle cx="24" cy="24" r="5" fill="#d8aa5d" fill-opacity="0.7"/>
    <circle cx="42" cy="24" r="5" fill="#f6efe1" fill-opacity="0.15"/>
    <circle cx="60" cy="24" r="5" fill="#f6efe1" fill-opacity="0.15"/>
    <text x="400" y="29" text-anchor="middle" fill="#f6efe1" fill-opacity="0.5" font-size="12" font-family="DM Sans, system-ui">Dashboard — Power BI Analytics</text>

    <!-- KPI Cards Row -->
    <!-- Card 1: Revenue -->
    <rect x="24" y="68" width="178" height="88" rx="14" fill="#f6efe1" fill-opacity="0.04" stroke="#f6efe1" stroke-opacity="0.08"/>
    <text x="42" y="92" fill="#f6efe1" fill-opacity="0.45" font-size="10.5" font-family="DM Sans, system-ui" letter-spacing="1.2">INGRESOS</text>
    <text x="42" y="122" fill="#f0c979" font-size="26" font-weight="700" font-family="DM Sans, system-ui">$847M</text>
    <text x="42" y="142" fill="#4ade80" font-size="10.5" font-family="DM Sans, system-ui">▲ 23.5%</text>

    <!-- Card 2: Efficiency -->
    <rect x="214" y="68" width="178" height="88" rx="14" fill="#f6efe1" fill-opacity="0.04" stroke="#f6efe1" stroke-opacity="0.08"/>
    <text x="232" y="92" fill="#f6efe1" fill-opacity="0.45" font-size="10.5" font-family="DM Sans, system-ui" letter-spacing="1.2">EFICIENCIA</text>
    <text x="232" y="122" fill="#f6efe1" font-size="26" font-weight="700" font-family="DM Sans, system-ui">94.2%</text>
    <text x="232" y="142" fill="#4ade80" font-size="10.5" font-family="DM Sans, system-ui">▲ 8.1%</text>

    <!-- Card 3: Projects -->
    <rect x="404" y="68" width="178" height="88" rx="14" fill="#f6efe1" fill-opacity="0.04" stroke="#f6efe1" stroke-opacity="0.08"/>
    <text x="422" y="92" fill="#f6efe1" fill-opacity="0.45" font-size="10.5" font-family="DM Sans, system-ui" letter-spacing="1.2">PROYECTOS</text>
    <text x="422" y="122" fill="#f6efe1" font-size="26" font-weight="700" font-family="DM Sans, system-ui">142</text>
    <text x="422" y="142" fill="#4ade80" font-size="10.5" font-family="DM Sans, system-ui">▲ 12 este mes</text>

    <!-- Card 4: Quality -->
    <rect x="594" y="68" width="178" height="88" rx="14" fill="#f6efe1" fill-opacity="0.04" stroke="#f6efe1" stroke-opacity="0.08"/>
    <text x="612" y="92" fill="#f6efe1" fill-opacity="0.45" font-size="10.5" font-family="DM Sans, system-ui" letter-spacing="1.2">CALIDAD ISO</text>
    <text x="612" y="122" fill="#d8aa5d" font-size="26" font-weight="700" font-family="DM Sans, system-ui">99.8%</text>
    <text x="612" y="142" fill="#d8aa5d" fill-opacity="0.6" font-size="10.5" font-family="DM Sans, system-ui">Cumplimiento</text>

    <!-- Main Chart Area -->
    <rect x="24" y="176" width="480" height="240" rx="14" fill="#f6efe1" fill-opacity="0.03" stroke="#f6efe1" stroke-opacity="0.06"/>
    <text x="42" y="202" fill="#f6efe1" fill-opacity="0.7" font-size="13" font-weight="500" font-family="DM Sans, system-ui">Tendencia de Rendimiento Operativo</text>

    <!-- Grid lines -->
    <line x1="46" y1="220" x2="490" y2="220" stroke="#f6efe1" stroke-opacity="0.04"/>
    <line x1="46" y1="260" x2="490" y2="260" stroke="#f6efe1" stroke-opacity="0.04"/>
    <line x1="46" y1="300" x2="490" y2="300" stroke="#f6efe1" stroke-opacity="0.04"/>
    <line x1="46" y1="340" x2="490" y2="340" stroke="#f6efe1" stroke-opacity="0.04"/>
    <line x1="46" y1="380" x2="490" y2="380" stroke="#f6efe1" stroke-opacity="0.04"/>

    <!-- Y axis labels -->
    <text x="42" y="224" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui" text-anchor="end">100</text>
    <text x="42" y="264" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui" text-anchor="end">75</text>
    <text x="42" y="304" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui" text-anchor="end">50</text>
    <text x="42" y="344" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui" text-anchor="end">25</text>

    <!-- Area fill under line -->
    <path d="M60 330 L110 305 L160 315 L210 280 L260 260 L310 240 L360 225 L410 215 L460 205 L490 200 L490 390 L60 390 Z" fill="url(#areaGrad)"/>

    <!-- Main trend line (gold) -->
    <path d="M60 330 L110 305 L160 315 L210 280 L260 260 L310 240 L360 225 L410 215 L460 205 L490 200" stroke="url(#lineGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Secondary line (ivory) -->
    <path d="M60 360 L110 345 L160 340 L210 330 L260 310 L310 300 L360 285 L410 278 L460 268 L490 260" stroke="#f6efe1" stroke-opacity="0.2" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 4"/>

    <!-- Data points on gold line -->
    <circle cx="260" cy="260" r="4" fill="#f0c979" filter="url(#glow)"/>
    <circle cx="360" cy="225" r="4" fill="#f0c979" filter="url(#glow)"/>
    <circle cx="490" cy="200" r="3.5" fill="#f0c979" filter="url(#glow)"/>

    <!-- X axis labels -->
    <text x="60" y="400" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui">Ene</text>
    <text x="160" y="400" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui">Mar</text>
    <text x="260" y="400" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui">May</text>
    <text x="360" y="400" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui">Jul</text>
    <text x="460" y="400" fill="#f6efe1" fill-opacity="0.25" font-size="9" font-family="DM Sans, system-ui">Sep</text>

    <!-- Donut Chart -->
    <rect x="520" y="176" width="252" height="240" rx="14" fill="#f6efe1" fill-opacity="0.03" stroke="#f6efe1" stroke-opacity="0.06"/>
    <text x="538" y="202" fill="#f6efe1" fill-opacity="0.7" font-size="13" font-weight="500" font-family="DM Sans, system-ui">Distribución de Servicios</text>

    <!-- Donut -->
    <circle cx="646" cy="310" r="64" fill="none" stroke="#f6efe1" stroke-opacity="0.06" stroke-width="18"/>
    <circle cx="646" cy="310" r="64" fill="none" stroke="#d8aa5d" stroke-width="18" stroke-dasharray="145 257" stroke-dashoffset="-64" stroke-linecap="round"/>
    <circle cx="646" cy="310" r="64" fill="none" stroke="#f0c979" stroke-opacity="0.6" stroke-width="18" stroke-dasharray="90 312" stroke-dashoffset="-209" stroke-linecap="round"/>
    <circle cx="646" cy="310" r="64" fill="none" stroke="#f6efe1" stroke-opacity="0.25" stroke-width="18" stroke-dasharray="60 342" stroke-dashoffset="-299" stroke-linecap="round"/>
    <text x="646" y="306" text-anchor="middle" fill="#f0c979" font-size="20" font-weight="700" font-family="DM Sans, system-ui">36%</text>
    <text x="646" y="322" text-anchor="middle" fill="#f6efe1" fill-opacity="0.4" font-size="9" font-family="DM Sans, system-ui">Power BI</text>

    <!-- Legend -->
    <circle cx="548" cy="395" r="4" fill="#d8aa5d"/>
    <text x="558" y="399" fill="#f6efe1" fill-opacity="0.5" font-size="9.5" font-family="DM Sans, system-ui">Power BI</text>
    <circle cx="628" cy="395" r="4" fill="#f0c979" fill-opacity="0.6"/>
    <text x="638" y="399" fill="#f6efe1" fill-opacity="0.5" font-size="9.5" font-family="DM Sans, system-ui">Python</text>
    <circle cx="700" cy="395" r="4" fill="#f6efe1" fill-opacity="0.25"/>
    <text x="710" y="399" fill="#f6efe1" fill-opacity="0.5" font-size="9.5" font-family="DM Sans, system-ui">ISO</text>

    <!-- Bottom Bar Chart -->
    <rect x="24" y="432" width="748" height="108" rx="14" fill="#f6efe1" fill-opacity="0.03" stroke="#f6efe1" stroke-opacity="0.06"/>
    <text x="42" y="458" fill="#f6efe1" fill-opacity="0.7" font-size="13" font-weight="500" font-family="DM Sans, system-ui">Proyectos por Categoría — Q4 2025</text>

    <!-- Bars -->
    <rect x="60" y="478" width="130" height="14" rx="7" fill="url(#goldBar)"/>
    <rect x="60" y="498" width="95" height="14" rx="7" fill="url(#goldBar)" opacity="0.7"/>
    <rect x="60" y="518" width="72" height="14" rx="7" fill="url(#ivoryBar)"/>

    <text x="198" y="490" fill="#f6efe1" fill-opacity="0.4" font-size="9.5" font-family="DM Sans, system-ui">Dashboards — 42</text>
    <text x="163" y="510" fill="#f6efe1" fill-opacity="0.4" font-size="9.5" font-family="DM Sans, system-ui">Automatización — 31</text>
    <text x="140" y="530" fill="#f6efe1" fill-opacity="0.4" font-size="9.5" font-family="DM Sans, system-ui">Consultoría ISO — 24</text>

    <!-- Mini sparklines on right -->
    <path d="M540 490 L560 482 L580 486 L600 475 L620 470 L640 460" stroke="#d8aa5d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M540 510 L560 505 L580 508 L600 500 L620 496 L640 488" stroke="#f0c979" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M540 530 L560 526 L580 528 L600 522 L620 518 L640 515" stroke="#f6efe1" stroke-opacity="0.25" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Right side mini indicators -->
    <text x="660" y="465" fill="#4ade80" font-size="10" font-family="DM Sans, system-ui">↑ 23%</text>
    <text x="660" y="492" fill="#4ade80" font-size="10" font-family="DM Sans, system-ui">↑ 15%</text>
    <text x="660" y="519" fill="#d8aa5d" font-size="10" font-family="DM Sans, system-ui">↑ 8%</text>
  </g>
</svg>